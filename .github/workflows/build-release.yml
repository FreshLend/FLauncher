name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для сборки'
        required: true
        default: 'T0'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install deps
        run: |
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt; }
          choco install upx -y
      
      - name: Build
        run: pyinstaller build.spec
        shell: pwsh
      
      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $VERSION = "${{ github.event.release.tag_name }}"
          } 
          elseif ("${{ github.event.inputs.version }}") {
            $VERSION = "${{ github.event.inputs.version }}"
          }
          else {
            $content = Get-Content -Path build.spec -Raw
            $pattern = 'VERSION\s*=\s*[''"]([^''"]+)[''"]'
            $match = [regex]::Match($content, $pattern)
            $VERSION = if ($match.Success) { $match.Groups[1].Value } else { "unknown" }
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Rename
        run: |
          $file = Get-ChildItem -Path dist -Filter "FLauncher-*.exe" | Select-Object -First 1
          $newname = "FLauncher-${{ steps.version.outputs.VERSION }}_win64.exe"
          Move-Item -Path $file.FullName -Destination "dist/$newname" -Force
        shell: pwsh
      
      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} "dist/FLauncher-${{ steps.version.outputs.VERSION }}_win64.exe" --clobber
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}_win64
          path: dist/FLauncher-${{ steps.version.outputs.VERSION }}_win64.exe

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 upx
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -o "VERSION = ['\"]*[^'\"]*['\"]*" build.spec | grep -o "['\"][^'\"]*['\"]" | tr -d "'\"")
          fi
          echo "VERSION=${VERSION:-unknown}" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Prepare binary
        run: |
          BINARY=$(find dist -name "FLauncher-*" -type f | head -1)
          cp "$BINARY" dist/flauncher
          chmod +x dist/flauncher
      
      - name: Create AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          mkdir -p AppDir/usr/bin
          cp dist/flauncher AppDir/usr/bin/flauncher
          
          cat > AppDir/flauncher.desktop <<EOF
          [Desktop Entry]
          Name=FLauncher
          Exec=flauncher
          Icon=flauncher
          Type=Application
          Categories=Game;
          EOF
          
          [ -f src/ui/icon.png ] && cp src/ui/icon.png AppDir/flauncher.png
          
          cat > AppDir/AppRun <<EOF
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/usr/bin/flauncher" "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir
          mv FLauncher-*.AppImage FLauncher-${{ steps.version.outputs.VERSION }}_x86-64.AppImage
      
      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} "FLauncher-${{ steps.version.outputs.VERSION }}_x86-64.AppImage" --clobber
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}_x86-64
          path: FLauncher-${{ steps.version.outputs.VERSION }}_x86-64.AppImage

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          brew install upx
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -o "VERSION = ['\"]*[^'\"]*['\"]*" build.spec | grep -o "['\"][^'\"]*['\"]" | tr -d "'\"")
          fi
          echo "VERSION=${VERSION:-unknown}" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"
      
      - name: Create DMG
        run: |
          APP_BUNDLE=$(find dist -name "*.app" -type d | head -n 1)
          mkdir -p dmg_temp
          cp -r "$APP_BUNDLE" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "FLauncher ${{ steps.version.outputs.VERSION }}" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "FLauncher-${{ steps.version.outputs.VERSION }}_macos.dmg"
      
      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} "FLauncher-${{ steps.version.outputs.VERSION }}_macos.dmg" --clobber
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}_macos
          path: FLauncher-${{ steps.version.outputs.VERSION }}_macos.dmg
