name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для сборки'
        required: true
        default: 'T0'

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt; }
      
      - name: Install UPX
        run: choco install upx -y
      
      - name: Build with PyInstaller
        run: pyinstaller build.spec
        shell: pwsh
      
      - name: Get version from build.spec
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -o "VERSION = ['\"]*[^'\"]*['\"]*" build.spec | grep -o "['\"][^'\"]*['\"]" | tr -d "'\"")
          if [ -z "$VERSION" ]; then
            if [[ "${{ github.event_name }}" == "release" ]]; then
              VERSION="${{ github.event.release.tag_name }}"
            else
              VERSION="${{ github.event.inputs.version }}"
            fi
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"
      
      - name: List dist folder
        run: ls -la dist/
        shell: bash
      
      - name: Rename Windows executable
        run: |
          $file = Get-ChildItem -Path dist -Filter "FLauncher-*.exe" | Select-Object -First 1
          if ($file) {
            $newname = "FLauncher-${{ steps.get_version.outputs.VERSION }}-win64.exe"
            Move-Item -Path $file.FullName -Destination "dist/$newname" -Force
            Write-Host "Renamed to: $newname"
          } else {
            Write-Host "No matching file found in dist folder"
            Get-ChildItem -Path dist
            exit 1
          }
        shell: pwsh
      
      - name: Upload to Release (Windows)
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/FLauncher-${{ steps.get_version.outputs.VERSION }}-win64.exe
          asset_name: FLauncher-${{ steps.get_version.outputs.VERSION }}-win64.exe
          asset_content_type: application/vnd.microsoft.portable-executable
      
      - name: Upload artifact (Windows)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.get_version.outputs.VERSION }}-win64
          path: dist/FLauncher-${{ steps.get_version.outputs.VERSION }}-win64.exe

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libgl1-mesa-dri \
            libegl1 \
            upx
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build with PyInstaller
        run: pyinstaller build.spec
      
      - name: Get version from build.spec
        id: get_version
        run: |
          VERSION=$(grep -o "VERSION = ['\"]*[^'\"]*['\"]*" build.spec | grep -o "['\"][^'\"]*['\"]" | tr -d "'\"")
          if [ -z "$VERSION" ]; then
            if [[ "${{ github.event_name }}" == "release" ]]; then
              VERSION="${{ github.event.release.tag_name }}"
            else
              VERSION="${{ github.event.inputs.version }}"
            fi
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"
      
      - name: List dist folder
        run: ls -la dist/
      
      - name: Rename Linux executable
        run: |
          FILE=$(find dist -name "FLauncher-*" -type f | head -1)
          if [ -n "$FILE" ]; then
            mv "$FILE" "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}"
            chmod +x "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}"
            echo "Renamed to: FLauncher-${{ steps.get_version.outputs.VERSION }}"
          else
            echo "No matching file found in dist folder"
            ls -la dist/
            exit 1
          fi
      
      - name: Upload to Release (Linux)
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/FLauncher-${{ steps.get_version.outputs.VERSION }}
          asset_name: FLauncher-${{ steps.get_version.outputs.VERSION }}-linux-x64
          asset_content_type: application/octet-stream
      
      - name: Upload artifact (Linux)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.get_version.outputs.VERSION }}-linux
          path: dist/FLauncher-${{ steps.get_version.outputs.VERSION }}

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Install UPX
        run: brew install upx || true
      
      - name: Fix ICNS icon
        run: |
          if [ -f src/ui/icon.icns ]; then
            echo "Testing existing ICNS file..."
            # Пробуем прочитать ICNS через Python
            python3 -c "
            from PIL import Image
            try:
                img = Image.open('src/ui/icon.icns')
                print(f'✓ ICNS is valid: {img.format} {img.size}')
            except Exception as e:
                print(f'✗ ICNS is invalid: {e}')
                exit(1)
            " || {
              echo "ICNS is invalid, converting from ICO..."
              python3 convert_icon.py src/ui/icon.ico src/ui/icon.icns
            }
          else
            echo "ICNS not found, converting from ICO..."
            python3 convert_icon.py src/ui/icon.ico src/ui/icon.icns
          fi
      
      - name: Build with PyInstaller
        run: pyinstaller build.spec
      
      - name: Get version from build.spec
        id: get_version
        run: |
          VERSION=$(grep -o "VERSION = ['\"]*[^'\"]*['\"]*" build.spec | grep -o "['\"][^'\"]*['\"]" | tr -d "'\"")
          if [ -z "$VERSION" ]; then
            if [[ "${{ github.event_name }}" == "release" ]]; then
              VERSION="${{ github.event.release.tag_name }}"
            else
              VERSION="${{ github.event.inputs.version }}"
            fi
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"
      
      - name: List dist folder
        run: ls -la dist/
      
      - name: Find and rename macOS app
        run: |
          APP_BUNDLE=$(find dist -name "*.app" -type d | head -1)
          
          if [ -n "$APP_BUNDLE" ]; then
            if [ "$(basename "$APP_BUNDLE")" != "FLauncher-${{ steps.get_version.outputs.VERSION }}.app" ]; then
              mv "$APP_BUNDLE" "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app"
              APP_BUNDLE="dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app"
            fi
            
            if [ -f src/ui/icon.icns ]; then
              mkdir -p "$APP_BUNDLE/Contents/Resources"
              cp src/ui/icon.icns "$APP_BUNDLE/Contents/Resources/icon.icns"
            fi
            
            echo "APP_BUNDLE=$APP_BUNDLE" >> $GITHUB_ENV
            echo "Found .app bundle: $APP_BUNDLE"
          else
            EXECUTABLE=$(find dist -name "FLauncher-*" -type f | head -1)
            if [ -n "$EXECUTABLE" ]; then
              echo "Found executable: $EXECUTABLE"
              mkdir -p "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app/Contents/MacOS"
              mkdir -p "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app/Contents/Resources"
              cp "$EXECUTABLE" "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app/Contents/MacOS/FLauncher"
              chmod +x "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app/Contents/MacOS/FLauncher"
              
              if [ -f src/ui/icon.icns ]; then
                cp src/ui/icon.icns "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app/Contents/Resources/icon.icns"
              fi
              
              cat > "dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app/Contents/Info.plist" << EOF
              <?xml version="1.0" encoding="UTF-8"?>
              <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
              <plist version="1.0">
              <dict>
                  <key>CFBundleExecutable</key>
                  <string>FLauncher</string>
                  <key>CFBundleIdentifier</key>
                  <string>com.flauncher.app</string>
                  <key>CFBundleName</key>
                  <string>FLauncher</string>
                  <key>CFBundleIconFile</key>
                  <string>icon.icns</string>
                  <key>CFBundleVersion</key>
                  <string>${{ steps.get_version.outputs.VERSION }}</string>
                  <key>CFBundleShortVersionString</key>
                  <string>${{ steps.get_version.outputs.VERSION }}</string>
                  <key>CFBundlePackageType</key>
                  <string>APPL</string>
                  <key>NSHighResolutionCapable</key>
                  <true/>
              </dict>
              </plist>
              EOF
              
              APP_BUNDLE="dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.app"
              echo "APP_BUNDLE=$APP_BUNDLE" >> $GITHUB_ENV
            else
              echo "No .app or executable found!"
              ls -la dist/
              exit 1
            fi
          fi
      
      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp -r "${{ env.APP_BUNDLE }}" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "FLauncher ${{ steps.get_version.outputs.VERSION }}" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg"
          echo "DMG created: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg"
          ls -la "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg"
      
      - name: Upload to Release (macOS)
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg
          asset_name: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg
          asset_content_type: application/x-apple-diskimage
      
      - name: Upload artifact (macOS)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos
          path: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg
