name: Build and Release FLauncher

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для сборки'
        required: true
        default: 'T0'

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow
          if (Test-Path requirements.txt) { pip install -r requirements.txt; }
      
      - name: Install UPX
        run: choco install upx -y
      
      - name: Set UTF-8 encoding
        run: |
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $env:PYTHONIOENCODING = "utf-8"
      
      - name: Build with PyInstaller
        run: |
          $env:PYTHONIOENCODING = "utf-8"
          pyinstaller build.spec
        shell: pwsh
      
      - name: Get version
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: List dist folder
        run: ls -la dist/
        shell: bash
      
      - name: Upload to Release (Windows)
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.exe
          asset_name: FLauncher-${{ steps.get_version.outputs.VERSION }}-win64.exe
          asset_content_type: application/vnd.microsoft.portable-executable
      
      - name: Upload artifact (Windows)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.get_version.outputs.VERSION }}-win64
          path: dist/FLauncher-${{ steps.get_version.outputs.VERSION }}.exe

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libgl1-mesa-dri \
            libegl1 \
            upx \
            file \
            wget
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build with PyInstaller
        run: |
          export PYTHONIOENCODING=utf-8
          pyinstaller build.spec
      
      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: List dist folder
        run: ls -la dist/
      
      - name: Make binary executable
        run: |
          chmod +x dist/FLauncher-${{ steps.get_version.outputs.VERSION }}
      
      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp dist/FLauncher-${{ steps.get_version.outputs.VERSION }} AppDir/usr/bin/flauncher
          chmod +x AppDir/usr/bin/flauncher
          
          cat > AppDir/usr/share/applications/flauncher.desktop << 'EOF'
          [Desktop Entry]
          Name=FLauncher
          Comment=VoxelCore Launcher
          Exec=flauncher
          Icon=flauncher
          Terminal=false
          Type=Application
          Categories=Game;
          EOF
          
          if [ -f src/ui/icon.png ]; then
            cp src/ui/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/flauncher.png
            echo "PNG icon copied"
          else
            echo "Warning: PNG icon not found at src/ui/icon.png"
          fi
          
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          
          if [ -f FLauncher-*.AppImage ]; then
            mv FLauncher-*.AppImage "FLauncher-${{ steps.get_version.outputs.VERSION }}-x86_64.AppImage"
            echo "AppImage created successfully"
          else
            echo "AppImage not created, trying appimagetool..."
            wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ./appimagetool-x86_64.AppImage AppDir "FLauncher-${{ steps.get_version.outputs.VERSION }}-x86_64.AppImage"
          fi
      
      - name: List AppImage
        run: ls -la FLauncher-*.AppImage || echo "No AppImage found"
      
      - name: Upload to Release (Linux)
        if: github.event_name == 'release' && success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: FLauncher-${{ steps.get_version.outputs.VERSION }}-x86_64.AppImage
          asset_name: FLauncher-${{ steps.get_version.outputs.VERSION }}-x86_64.AppImage
          asset_content_type: application/x-iso9660-appimage
      
      - name: Upload artifact (Linux)
        if: github.event_name != 'release' && success()
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.get_version.outputs.VERSION }}-linux
          path: FLauncher-${{ steps.get_version.outputs.VERSION }}-x86_64.AppImage

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pillow
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Install UPX
        run: brew install upx || true
      
      - name: Install create-dmg
        run: brew install create-dmg || true
      
      - name: Check icon
        run: |
          if [ -f src/ui/icon.icns ]; then
            echo "ICNS icon found"
            file src/ui/icon.icns
          else
            echo "Warning: ICNS icon not found at src/ui/icon.icns"
          fi
      
      - name: Build with PyInstaller
        run: |
          export PYTHONIOENCODING=utf-8
          pyinstaller build.spec
        env:
          PYTHONIOENCODING: utf-8
      
      - name: Get version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: List dist folder
        run: ls -la dist/
      
      - name: Find .app bundle
        id: find_app
        run: |
          APP_BUNDLE=$(find dist -name "*.app" -type d | head -n 1)
          
          if [ -n "$APP_BUNDLE" ]; then
            echo "APP_BUNDLE=$APP_BUNDLE" >> $GITHUB_ENV
            echo "Found .app bundle: $APP_BUNDLE"
          else
            echo "No .app bundle found!"
            ls -la dist/
            exit 1
          fi
      
      - name: Verify .app structure
        run: |
          echo "Contents of .app bundle:"
          ls -la "${{ env.APP_BUNDLE }}/Contents/MacOS/" || echo "No MacOS folder"
          ls -la "${{ env.APP_BUNDLE }}/Contents/Resources/" || echo "No Resources folder"
          
          if [ -f "${{ env.APP_BUNDLE }}/Contents/MacOS/FLauncher" ]; then
            echo "Executable found"
            file "${{ env.APP_BUNDLE }}/Contents/MacOS/FLauncher"
          else
            echo "Warning: Executable not found in standard location"
          fi
      
      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          
          cp -r "${{ env.APP_BUNDLE }}" dmg_temp/
          
          APP_NAME=$(basename "${{ env.APP_BUNDLE }}")
          
          ln -s /Applications dmg_temp/Applications
          
          if [ -f src/ui/icon.icns ]; then
            echo "Creating DMG with icon..."
            create-dmg \
              --volname "FLauncher ${{ steps.get_version.outputs.VERSION }}" \
              --volicon "src/ui/icon.icns" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --icon "$APP_NAME" 200 190 \
              --hide-extension "$APP_NAME" \
              --app-drop-link 600 185 \
              "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg" \
              "dmg_temp/" || {
                echo "create-dmg failed, trying hdiutil..."
                hdiutil create -volname "FLauncher ${{ steps.get_version.outputs.VERSION }}" \
                  -srcfolder dmg_temp \
                  -ov -format UDZO \
                  "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg"
              }
          else
            echo "Creating DMG without icon..."
            create-dmg \
              --volname "FLauncher ${{ steps.get_version.outputs.VERSION }}" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --icon "$APP_NAME" 200 190 \
              --hide-extension "$APP_NAME" \
              --app-drop-link 600 185 \
              "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg" \
              "dmg_temp/" || {
                echo "create-dmg failed, trying hdiutil..."
                hdiutil create -volname "FLauncher ${{ steps.get_version.outputs.VERSION }}" \
                  -srcfolder dmg_temp \
                  -ov -format UDZO \
                  "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg"
              }
          fi
      
      - name: List DMG
        run: |
          ls -la FLauncher-*-macos.dmg || echo "No DMG found"
          if [ -f "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg" ]; then
            echo "DMG created successfully"
            file "FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg"
          fi
      
      - name: Upload to Release (macOS)
        if: github.event_name == 'release' && success()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg
          asset_name: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg
          asset_content_type: application/x-apple-diskimage
      
      - name: Upload artifact (macOS)
        if: github.event_name != 'release' && success()
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos
          path: FLauncher-${{ steps.get_version.outputs.VERSION }}-macos.dmg
