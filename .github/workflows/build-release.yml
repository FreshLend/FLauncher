name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install deps
        run: |
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt; }
          choco install upx -y
      
      - name: Build
        run: pyinstaller build.spec
        shell: pwsh
      
      - name: Find and rename EXE
        id: artifact
        shell: pwsh
        run: |
          $file = Get-ChildItem -Path dist -Filter "FLauncher-*.exe" | Select-Object -First 1
          if ($file -eq $null) {
            Write-Error "Не найден exe файл в dist"
            exit 1
          }
          $newname = "FLauncher_win64.exe"
          Write-Host "Переименовываем $($file.Name) в $newname"
          Move-Item -Path $file.FullName -Destination "dist/$newname" -Force
          echo "artifact_path=dist/$newname" >> $env:GITHUB_OUTPUT
          echo "artifact_name=$newname" >> $env:GITHUB_OUTPUT
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.artifact_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher_win64
          path: ${{ steps.artifact.outputs.artifact_path }}
          if-no-files-found: error

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 upx
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Prepare binary
        id: artifact
        run: |
          BINARY=$(find dist -name "FLauncher-*" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "Ошибка: не найден бинарник в dist"
            exit 1
          fi
          echo "Найден бинарник: $BINARY"
          cp "$BINARY" dist/flauncher
          chmod +x dist/flauncher
      
      - name: Create AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          mkdir -p AppDir/usr/bin
          cp dist/flauncher AppDir/usr/bin/flauncher
          
          cat > AppDir/flauncher.desktop <<EOF
          [Desktop Entry]
          Name=FLauncher
          Exec=flauncher
          Icon=flauncher
          Type=Application
          Categories=Game;
          EOF
          
          [ -f src/ui/icon.png ] && cp src/ui/icon.png AppDir/flauncher.png
          
          cat > AppDir/AppRun <<EOF
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/usr/bin/flauncher" "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir
          
          APPIMAGE_FILE=$(ls FLauncher-*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "Ошибка: AppImage не создан"
            exit 1
          fi
          mv "$APPIMAGE_FILE" "FLauncher_linux_x86-64.AppImage"
          echo "artifact_path=FLauncher_linux_x86-64.AppImage" >> $GITHUB_OUTPUT
          echo "artifact_name=FLauncher_linux_x86-64.AppImage" >> $GITHUB_OUTPUT
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.artifact_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher_linux_x86-64
          path: ${{ steps.artifact.outputs.artifact_path }}
          if-no-files-found: error

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          brew install upx
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Create DMG
        id: artifact
        run: |
          APP_BUNDLE=$(find dist -name "*.app" -type d | head -n 1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "Ошибка: не найден .app bundle в dist"
            exit 1
          fi
          
          echo "Найден .app: $APP_BUNDLE"
          mkdir -p dmg_temp
          cp -r "$APP_BUNDLE" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          
          DMG_NAME="FLauncher_macos.dmg"
          hdiutil create -volname "FLauncher" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "$DMG_NAME"
          
          echo "artifact_path=$DMG_NAME" >> $GITHUB_OUTPUT
          echo "artifact_name=$DMG_NAME" >> $GITHUB_OUTPUT
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.artifact_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher_macos
          path: ${{ steps.artifact.outputs.artifact_path }}
          if-no-files-found: error
