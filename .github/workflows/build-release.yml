name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для сборки'
        required: true
        default: 'T0'

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt; }
      
      - name: Build
        run: pyinstaller build.spec
        shell: pwsh
      
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content -Path build.spec -Raw
          $pattern = 'VERSION\s*=\s*[''"]([^''"]+)[''"]'
          $match = [regex]::Match($content, $pattern)
          
          if ($match.Success) {
            $VERSION = $match.Groups[1].Value
          } else {
            $VERSION = "${{ github.event.inputs.version }}"
          }
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
      
      - name: Rename
        run: |
          $file = Get-ChildItem -Path dist -Filter "FLauncher-*.exe" | Select-Object -First 1
          $newname = "FLauncher-${{ steps.version.outputs.VERSION }}-win64.exe"
          Move-Item -Path $file.FullName -Destination "dist/$newname" -Force
        shell: pwsh
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/FLauncher-${{ steps.version.outputs.VERSION }}-win64.exe
          asset_name: FLauncher-${{ steps.version.outputs.VERSION }}-win64.exe
          asset_content_type: application/vnd.microsoft.portable-executable
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}-win64
          path: dist/FLauncher-${{ steps.version.outputs.VERSION }}-win64.exe

  build-linux:
    name: Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -o "VERSION = ['\"]*[^'\"]*['\"]*" build.spec | grep -o "['\"][^'\"]*['\"]" | tr -d "'\"")
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Create AppImage
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          
          mkdir -p AppDir/usr/bin
          cp dist/FLauncher-${{ steps.version.outputs.VERSION }} AppDir/usr/bin/flauncher
          chmod +x AppDir/usr/bin/flauncher
          
          cat > AppDir/flauncher.desktop <<EOF
          [Desktop Entry]
          Name=FLauncher
          Exec=flauncher
          Icon=flauncher
          Type=Application
          Categories=Game;
          EOF
          
          if [ -f src/ui/icon.png ]; then
            cp src/ui/icon.png AppDir/flauncher.png
          fi
          
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir
          mv FLauncher-*.AppImage FLauncher-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: FLauncher-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
          asset_name: FLauncher-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
          asset_content_type: application/x-iso9660-appimage
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}-linux
          path: FLauncher-${{ steps.version.outputs.VERSION }}-x86_64.AppImage

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Create DMG
        run: |
          APP_BUNDLE=$(find dist -name "*.app" -type d | head -n 1)
          mkdir -p dmg_temp
          cp -r "$APP_BUNDLE" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "FLauncher ${{ steps.version.outputs.VERSION }}" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "FLauncher-${{ steps.version.outputs.VERSION }}-macos.dmg"
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: FLauncher-${{ steps.version.outputs.VERSION }}-macos.dmg
          asset_name: FLauncher-${{ steps.version.outputs.VERSION }}-macos.dmg
          asset_content_type: application/x-apple-diskimage
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}-macos
          path: FLauncher-${{ steps.version.outputs.VERSION }}-macos.dmg
