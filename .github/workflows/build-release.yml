name: Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для сборки'
        required: true
        default: 'T0'

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
      
      - name: Install deps
        run: |
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt; }
          choco install upx -y
      
      - name: Build
        run: pyinstaller build.spec
        shell: pwsh
      
      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $VERSION = "${{ github.event.release.tag_name }}"
          } else {
            $VERSION = "${{ github.event.inputs.version }}"
          }
          
          if ([string]::IsNullOrEmpty($VERSION)) {
            Write-Host "Версия не определена через event, парсим build.spec..."
            $content = Get-Content -Path build.spec -Raw
            $pattern = 'VERSION\s*=\s*[''"]([^''"]+)[''"]'
            $match = [regex]::Match($content, $pattern)
            if ($match.Success) { 
              $VERSION = $match.Groups[1].Value
              Write-Host "Найдена версия в build.spec: $VERSION"
            } else {
              $VERSION = "unknown"
              Write-Host "Версия не найдена, используем 'unknown'"
            }
          }
          
          Write-Host "Итоговая версия: $VERSION"
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
      
      - name: Rename
        run: |
          $file = Get-ChildItem -Path dist -Filter "FLauncher-*.exe" | Select-Object -First 1
          if ($file -eq $null) {
            Write-Error "Не найден exe файл в dist"
            exit 1
          }
          $newname = "FLauncher-${{ steps.version.outputs.VERSION }}_win64.exe"
          Write-Host "Переименовываем $($file.Name) в $newname"
          Move-Item -Path $file.FullName -Destination "dist/$newname" -Force
        shell: pwsh
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FLauncher-${{ steps.version.outputs.VERSION }}_win64.exe
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}_win64
          path: dist/FLauncher-${{ steps.version.outputs.VERSION }}_win64.exe
          if-no-files-found: error

  build-linux:
    name: Linux Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 upx
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [[ -z "$VERSION" ]]; then
            echo "Версия не определена через event, парсим build.spec..."
            VERSION=$(grep -o "VERSION = ['\"]*[^'\"]*['\"]*" build.spec | grep -o "['\"][^'\"]*['\"]" | tr -d "'\"")
            if [[ -n "$VERSION" ]]; then
              echo "Найдена версия в build.spec: $VERSION"
            else
              VERSION="unknown"
              echo "Версия не найдена, используем 'unknown'"
            fi
          fi
          
          echo "Итоговая версия: $VERSION"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Prepare binary
        run: |
          BINARY=$(find dist -name "FLauncher-*" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "Ошибка: не найден бинарник в dist"
            exit 1
          fi
          echo "Найден бинарник: $BINARY"
          cp "$BINARY" dist/flauncher
          chmod +x dist/flauncher
      
      - name: Create AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          mkdir -p AppDir/usr/bin
          cp dist/flauncher AppDir/usr/bin/flauncher
          
          cat > AppDir/flauncher.desktop <<EOF
          [Desktop Entry]
          Name=FLauncher
          Exec=flauncher
          Icon=flauncher
          Type=Application
          Categories=Game;
          EOF
          
          [ -f src/ui/icon.png ] && cp src/ui/icon.png AppDir/flauncher.png
          
          cat > AppDir/AppRun <<EOF
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/usr/bin/flauncher" "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir
          
          APPIMAGE_FILE=$(ls FLauncher-*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE_FILE" ]; then
            echo "Ошибка: AppImage не создан"
            exit 1
          fi
          mv "$APPIMAGE_FILE" "FLauncher-${{ steps.version.outputs.VERSION }}_x86-64.AppImage"
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: FLauncher-${{ steps.version.outputs.VERSION }}_x86-64.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}_x86-64
          path: FLauncher-${{ steps.version.outputs.VERSION }}_x86-64.AppImage
          if-no-files-found: error

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          brew install upx
      
      - name: Build
        run: pyinstaller build.spec
      
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [[ -z "$VERSION" ]]; then
            VERSION="unknown"
            echo "Версия не определена, используем 'unknown'"
          fi
          
          echo "Итоговая версия: $VERSION"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Create DMG
        run: |
          APP_BUNDLE=$(find dist -name "*.app" -type d | head -n 1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "Ошибка: не найден .app bundle в dist"
            exit 1
          fi
          
          echo "Найден .app: $APP_BUNDLE"
          mkdir -p dmg_temp
          cp -r "$APP_BUNDLE" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          
          DMG_NAME="FLauncher-${{ steps.version.outputs.VERSION }}_macos.dmg"
          hdiutil create -volname "FLauncher ${{ steps.version.outputs.VERSION }}" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            "$DMG_NAME"
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: FLauncher-${{ steps.version.outputs.VERSION }}_macos.dmg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: FLauncher-${{ steps.version.outputs.VERSION }}_macos
          path: FLauncher-${{ steps.version.outputs.VERSION }}_macos.dmg
          if-no-files-found: error
